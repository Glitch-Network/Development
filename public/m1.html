    <script>
        localStorage.setItem("in_bounds", "1"); // DO NOT REMOVE THIS LINE, ITS ESSENTIAL FOR THE ARROW SYSTEM

        function load() {
            const x = window.location.href;
            const code = `
                <body style="background-color: black">
                <iframe src="${x}" frameborder="0" style="border: none; background-color: black" width="100%" height="100%"></iframe>
                </body>
            `;
            const newWindow = window.open("about:blank", "_blank");
            newWindow.document.write(code);
            newWindow.document.body.style.backgroundColor = "black";
        }

        let str = "";
        document.addEventListener("keypress", function (e) {
            str += e.key;
            if (str === "welcome to glitch") {
                document.body.innerHTML = '<iframe style="height: 100vh; width: 100vw" id="ytplayer" type="text/html" width="720" height="405" src="./launch.html?url=https://www.youtube.com/embed/tubpfE8bl8Q?autoplay=1&controls=0" frameborder="0" allowfullscreen></iframe>';
                document.getElementById("ytplayer").addEventListener("load", function () {
                    setTimeout(function () {
                        window.location.reload(); // end of easter egg
                    }, 7000);
                });
            }
        });

        if (localStorage.getItem("change_discord_inv_url")) {
            document.getElementById("discord").onclick = function () {
                window.open(localStorage.getItem("change_discord_inv_url"));
            };
        }
    </script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const code = `
            <img id="arrow" src="./assets/images/arrow1.png" style="z-index: 15; position: fixed; width: 90px; bottom: calc(50% - 10px); left: 15px;  cursor: pointer; filter: invert(1); transform: scaleX(-1);">
            <img id="arrow1" src="./assets/images/arrow1.png" style="z-index: 15; position: fixed; width: 90px; bottom: calc(50% - 10px); right: 15px; cursor: pointer; filter: invert(1);">
        `;

        const x = document.createElement("div");
        x.innerHTML = code;
        document.body.appendChild(x);

        const tabs = ["m1", "m2", "extras/chatroom", "settings", "extras/usekey"];
        const arrow = document.getElementById("arrow");
        const arrow1 = document.getElementById("arrow1");

        function getCurrentTab() {
            const path = window.location.pathname.split("/").pop().replace(".html", "");
            return tabs.indexOf(path);
        }

        let current_tab = getCurrentTab();

        function updateTab() {
            window.location.href = "./" + tabs[current_tab] + ".html";
        }

        function updateArrows() {
            arrow.style.display = "block"; // Always show arrows for looping
            arrow1.style.display = "block";
        }

        arrow.addEventListener("click", function () {
            current_tab = (current_tab - 1 + tabs.length) % tabs.length; // Loop backwards
            updateTab();
            updateArrows();
        });

        arrow1.addEventListener("click", function () {
            current_tab = (current_tab + 1) % tabs.length; // Loop forwards
            updateTab();
            updateArrows();
        });

        // Initialize the tab and arrows on page load
        updateArrows();
    });
</script>

            <br>
            <img id="rr" style="position: fixed; opacity: .9; border-radius: 15px; border: #131313 2px solid; width: 350px; height: 150px; margin-top: 230px" onclick="window.open('https://discord.gg/2n3NHNBzda')" src="assets/ads/youradhere.png">
        </center>
    </div>

    <script>
        if (localStorage.getItem("hide_ad") == "1") {
            document.getElementById("rr").style.display = "none";
        }
        const ads = ["galaxy.png", "outpost.png", "youradhere.png", "youcanturnoffads.png"];
        const ads_urls = ["https://discord.gg/8wEk32uKQk", "https://discord.gg/4AeuJJHNj9", "https://discord.gg/2n3NHNBzda", "https://ublock.org"];
        let current_ad = 0;

        setInterval(function () {
            document.getElementById("rr").src = "./assets/ads/" + ads[current_ad];
            if (current_ad === ads.length - 1) current_ad = 0;
            else current_ad = (current_ad + 1) % ads.length;

            document.getElementById("rr").onclick = function () {
                window.open(ads_urls[current_ad]);
            };
        }, 10000); // every 10 seconds
    </script>
