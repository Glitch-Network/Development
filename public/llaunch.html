<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no" />
    <title>Glitch</title>
    <meta name="googlebot" content="index, follow, snippet" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="gbl.css" />
    <style>
        body {
            overflow: hidden;
            background-color: black;
        }
        #loading-div {
            position: fixed;
            top: -1px;
            left: -1px;
        }
        * {
            border: none;
        }
        #root {
            position: fixed;
            left: 5px;
            background-color: white;
            opacity: 0.5;
            top: 15px;
        }
    </style>
    <script src="baremux/bare.cjs" defer></script>
    <script src="epoxy/index.js" defer></script>
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
    <script src="register-sw.js" defer></script>
    <script src="search.js" defer></script>
    <script src="index.js" defer></script>
    <script src="options.js" defer></script>
    <script src="scripts/nowgg.js" defer></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-278K4F012J"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-278K4F012J');
    </script>
</head>
<body>
    <div id="root"></div>
    <form id="uv-form" class="flex-center">
        <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden" />
        <input id="uv-address" type="text" placeholder="Search the web freely" style="display: none;" />
    </form>
    <iframe id="uv-frame" style="border: none; height: 100vh; width: 100vw;"></iframe>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
          var refreshParam = getURLParameter('refresh');
            var urlParam = getURLParameter("url");
            if (!refreshParam) {
                window.location = 'llaunch.html?refresh=1&url=' + urlParam;
            }

            var search_engine_preference = localStorage.getItem("search_engine");
            var search_engine = "https://www.google.com/search?q=";
            var premium_status = localStorage.getItem("premium");

            if (search_engine_preference) {
                var search_engines = {
                    "Google": "https://www.google.com/search?q=",
                    "DuckDuckGo": "https://duckduckgo.com/?q=",
                    "Bing": "https://www.bing.com/search?q=",
                    "Yahoo": "https://search.yahoo.com/search?p=",
                    "Torry": premium_status === "false" ? "https://www.google.com/search?q=" : "https://www.torry.io/search/?type=oniontab&searchby_type=1&page=1&q=",
                    "Startpage": premium_status === "false" ? "https://www.google.com/search?q=" : "https://www.startpage.com/do/search?query=",
                    "Qwant": premium_status === "false" ? "https://www.google.com/search?q=" : "https://www.qwant.com/?t=web&q=",
                    "Brave": premium_status === "false" ? "https://www.google.com/search?q=" : "https://search.brave.com/search?q="
                };
                search_engine = search_engines[search_engine_preference] || search_engine;
            }

            document.getElementById("uv-search-engine").value = search_engine;

            var proxy_bridge = localStorage.getItem("proxy");
            var bridge = "";
            if (premium_status === "true") {
                var proxy_bridges = {
                    "Glitch EU Proxy": "https://v6-out.onrender.com/llaunch.html?url=",
                    "12FT": "https://12ft.io/",
                    "Archive.org/Wayback Machine": "https://web.archive.org/",
                    "Google Cache": "https://webcache.googleusercontent.com/search?q=cache:"
                };
                bridge = proxy_bridges[proxy_bridge] || "";

                function getURLParameter(name) {
                    var results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
                    return results ? decodeURIComponent(results[1]) : null;
                }

                var urlParam = getURLParameter("url");
                if (urlParam && !urlParam.includes(bridge) && bridge !== "None (Built-in only)") {
                    var xurl = urlParam.includes("https://") ? urlParam : "https://" + urlParam;
                    if (window.location.href.includes("?refresh")){
                      window.location.href = "llaunch.html?refresh=1&bridge=1&url=" + bridge + xurl;
                    }
                }
            }


            if (urlParam) {
                if (!localStorage.getItem("history")) {
                    localStorage.setItem("history", "");
                }
                var historyArray = localStorage.getItem("history").split(",");
                if (!urlParam.includes("torry.io") && historyArray[historyArray.length - 1] !== urlParam) {
                    localStorage.setItem("history", localStorage.getItem("history") + "," + (historyArray.length > 1 ? "," : "") + urlParam);
                }

                if (urlParam.includes(".onion") && premium_status === "true" && localStorage.getItem("tor") === "true") {
                    window.location = "./llaunch.html?url=https://onion.torry.io/index.php?q=" + urlParam.replace(".onion", "").replace("http://", "").replace("https://", "");
                }
            }
        });
    </script>
</body>
</html>
