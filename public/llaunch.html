<body>
    <div id="root" style="position: fixed; left: 5px; background-color: white; opacity: 0.5; top: 15px;"></div>
    
    <form id="uv-form" class="flex-center">
        <input id="uv-search-engine" value="https://www.google.com/search?q=%s" type="hidden">
        <input style="display: none;" id="uv-address" type="text" placeholder="Search the web freely">
    </form>
    
    <iframe style="border: none; height: 100vh; width: 100vw" id="uv-frame"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const searchEnginePreference = localStorage.getItem("search_engine");
            const premiumStatus = localStorage.getItem("premium");
            const proxyBridge = localStorage.getItem("proxy");
            let searchEngine = "https://www.google.com/search?q=";
            let bridge = "";

            const searchEngines = {
                Google: "https://www.google.com/search?q=",
                DuckDuckGo: "https://duckduckgo.com/?q=",
                Bing: "https://www.bing.com/search?q=",
                Yahoo: "https://search.yahoo.com/search?p=",
                Torry: premiumStatus === "true" ? "https://www.torry.io/search/?type=oniontab&searchby_type=1&page=1&q=" : "https://www.google.com/search?q=",
                Startpage: premiumStatus === "true" ? "https://www.startpage.com/do/search?query=" : "https://www.google.com/search?q=",
                Qwant: premiumStatus === "true" ? "https://www.qwant.com/?t=web&q=" : "https://www.google.com/search?q=",
                Brave: premiumStatus === "true" ? "https://search.brave.com/search?q=" : "https://www.google.com/search?q="
            };

            if (searchEnginePreference && searchEngines[searchEnginePreference=]) {
                searchEngine = searchEngines[searchEnginePreference];
            }
            
            if (!getURLParameter("url").includes(".")){
              window.location = "llaunch.html?url=" + searchEngine +getURLParameter("url").replace(" ","+") 
            }

            const proxyBridges = {
                "Glitch EU Proxy": "https://v6-out.onrender.com/llaunch.html?url=",
                "12FT": "https://12ft.io/",
                "Archive.org/Wayback Machine": "https://web.archive.org/",
                "Google Cache": "https://webcache.googleusercontent.com/search?q=cache:"
            };

            if (premiumStatus === "true" && proxyBridge && proxyBridges[proxyBridge]) {
                bridge = proxyBridges[proxyBridge];

                const getURLParameter = (name) => {
                    const results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
                    return results ? decodeURIComponent(results[1]) : null;
                };

                if (getURLParameter("bridge") !== "1" && getURLParameter("url") && !getURLParameter("url").includes(bridge) && bridge !== "None (Built-in only)") {
                    let xurl = getURLParameter("url");
                    if (!xurl.includes("https://")) {
                        xurl = "https://" + xurl;
                    }
                    window.location.href = `llaunch.html?bridge=1&url=${bridge}${xurl}`;
                } else {
                    console.log("bridge 4 u");
                }
            } else {
                console.log("no bridge 4 u");
            }

            if (getURLParameter("url")) {
                const url = getURLParameter("url");
                if (!localStorage.getItem("history")) {
                    localStorage.setItem("history", "");
                }

                const historyArray = localStorage.getItem("history").split(",");
                if (historyArray[historyArray.length - 1] !== url && !url.includes("torry.io")) {
                    localStorage.setItem("history", localStorage.getItem("history") + "," + (historyArray.length > 1 ? "," : "") + url);
                }

                if (url.includes(".onion") && localStorage.getItem("premium") === "true" && localStorage.getItem("tor") === "true") {
                    window.location = `./llaunch.html?url=https://onion.torry.io/index.php?q=${url.replace(".onion", "").replace("http://", "").replace("https://", "")}`;
                }
            }
        });
    </script>
</body>
