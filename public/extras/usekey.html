        <script>

            /*

                function toggle(target){
                    // toggle the local storage key
                    if (localStorage.getItem(target) == "true"){
                        localStorage.setItem(target, "false");
                    } else {
                        localStorage.setItem(target, "true");
                    }
                }

            
                function validateToken(token) {
    const invalidNumbers = ["1", "3", "5", "7", "9", "0"];
    console.log("num");

    for (let number of invalidNumbers) {
        if (token.split("tkn_exp")[0].includes(number)) {
            return false;
        }
    }

    console.log("length");

    const validLengths = [25, 28, 35];
    if (!validLengths.includes(token.split("tkn_exp")[0].length)) {
        return false;
    }

    console.log("doyouknowwhatiknow");

    if (token.includes("cyn") && token.includes("tkn")) {
        if (token.includes("tkn_exp")) {
            const currentYear = new Date().getFullYear();
            const decadePrefix = currentYear.toString().substring(0, 3);

            let tokenDatePart = token.split("tkn_exp")[1];
            let day, month, year;

            if (tokenDatePart.startsWith("d2")) {
                day = tokenDatePart.substring(2, 4); // Corrected to 2, 4 to get the correct day
                month = tokenDatePart.substring(4, 6); // Corrected to 4, 6 to get the correct month
                year = tokenDatePart.substring(6, 7); // Corrected to 6, 7 to get the correct year
            } else {
                day = tokenDatePart.substring(0, 2); // Corrected to 0, 2 to get the correct day
                month = tokenDatePart.substring(2, 4); // Corrected to 2, 4 to get the correct month
                year = tokenDatePart.substring(4, 5); // Corrected to 4, 5 to get the correct year
            }

            const fullYear = decadePrefix + year;
            console.log(`Parsed Date: Year: ${fullYear}, Month: ${month}, Day: ${day}`);

            const date = new Date(`${fullYear}-${month}-${day}`);
            const currentDate = new Date();

            console.log(`Parsed Date Object: ${date}`);
            console.log(`Current Date Object: ${currentDate}`);

            if (currentDate > date) {
                console.log(currentDate + " 2: " + date);
                console.log("false date");
                return false;
            }


            return true;
        }
        alert("It appears this deployment of Glitch is using a V1 token! Refer to the Discord to get a new key!");
        return false;
    } else {
        return false;
    }
}


function verify_dat_sheet(){
            token = document.getElementById("key").value
            // Check the token
            if (validateToken(token)) {

                localStorage.setItem("key", token) // for future reference/checking
                localStorage.setItem("premium", "true");
                
                document.getElementById("keyDiv").style.display = "none";
                    document.getElementById("useKey").style.display = "none";
                    document.getElementById("options").style.display = "block";
            } else {
              if (token != ""){
                alert("Invalid premium key");
              }
              localStorage.setItem("premium", "false");
            }
        }


        function useKey() {
            token = document.getElementById("key").value

            verify_dat_sheet();

            if (localStorage.getItem("premium") == "true") {



            }
            
        }

        document.addEventListener(
            "DOMContentLoaded",
            function() {
                if (localStorage.getItem("key") != null) {
                    token = localStorage.getItem("key")

                    if (!validateToken(token)) {
                        localStorage.setItem("key", "")
                        localStorage.setItem("premium", "false")
                        alert("Your key is expired! Please use a new key!")

                }
            }
                if (localStorage.getItem("premium") == "true") {
                    document.getElementById("keyDiv").style.display = "none";
                    document.getElementById("useKey").style.display = "none";
                    document.getElementById("options").style.display = "block";
                }

            }
        )
